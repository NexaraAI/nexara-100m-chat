name: Benchmark

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  forward:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Parameter count verification
        run: >
          python -m scripts.verify_parameter_count
          --config configs/stage1_tinystories.toml
          --minimum 5000000
          --maximum 10000000

      - name: Forward pass benchmark
        run: >
          python -m scripts.benchmark_forward
          --tiny
          --iterations 5
          --output logs/benchmark/forward.json

      - name: Tokenizer smoke test
        run: python -m scripts.tokenizer_smoke --output-dir logs/tokenizer_smoke

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs
          path: |
            logs/benchmark/
            logs/tokenizer_smoke/
