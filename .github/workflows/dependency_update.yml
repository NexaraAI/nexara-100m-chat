name: Dependency Update

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependency tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-tools

      - name: Compile upgraded runtime lock
        run: >
          pip-compile
          --upgrade
          --strip-extras
          --output-file requirements.lock
          requirements.txt

      - name: Compile upgraded development lock
        run: >
          pip-compile
          --upgrade
          --extra dev
          --output-file requirements-dev.lock
          pyproject.toml

      - name: Open dependency update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update dependency locks"
          title: "Update dependency locks"
          body: "Weekly dependency lock refresh generated by GitHub Actions."
          branch: actions/update-dependencies
          delete-branch: true
          add-paths: |
            requirements.lock
            requirements-dev.lock
